version: 2

models:
  - name: bronze_returns
    columns:
      - name: return_reason
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Damaged
                  - Defective
                  - Wrong Item
                  - Late Delivery
                  - Changed Mind
  - name: bronze_sales
    columns:
      - name: net_amount
        data_tests:
          - is_non_negative
